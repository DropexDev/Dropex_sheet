<!DOCTYPE html>
<html dir="rtl" lang="ar">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>بوابة المندوبين - Dropex</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            "primary": "#0a1e4d",
            "secondary": "#ff6b35",
            "background": "#f7f9fb",
            "surface": "#ffffff",
            "on-surface": "#191c1e",
            "outline": "#757682"
          },
          fontFamily: { "ibm-plex-arabic": ["IBM Plex Sans Arabic", "sans-serif"] }
        }
      }
    }
  </script>
  <style>
    body {
      font-family: 'IBM Plex Sans Arabic', sans-serif;
      background-color: #f7f9fb;
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    .custom-shadow {
      box-shadow: 0 10px 25px -5px rgba(10, 30, 77, 0.05), 0 8px 10px -6px rgba(10, 30, 77, 0.05);
    }
  </style>
</head>

<body class="min-h-screen text-on-surface p-4">

  <!-- Login Section -->
  <div id="loginSection"
    class="flex flex-col items-center justify-center min-h-[80vh] w-full max-w-md mx-auto transition-all duration-500">
    <div class="bg-surface w-full p-8 rounded-3xl custom-shadow border border-slate-100 text-center">
      <a href="javascript:void(0)" onclick="navigateTo('home')" class="inline-block mb-6">
        <img alt="Dropex Logo" src="https://i.postimg.cc/V6sxBsF8/dropex.png" class="h-12 w-auto mx-auto" />
      </a>
      <h2 class="text-2xl font-bold text-primary mb-2">بوابة المناديب</h2>
      <p class="text-outline text-sm mb-8">تسجيل الدخول لمتابعة الشحنات</p>

      <div class="space-y-4 text-right">
        <div class="relative">
          <span class="material-symbols-outlined absolute right-3 top-3.5 text-outline text-xl">mail</span>
          <input type="email" id="emailInput" placeholder="البريد الإلكتروني"
            class="w-full bg-background border-none rounded-2xl pr-11 pl-4 py-4 text-sm focus:ring-2 focus:ring-secondary transition-all">
        </div>
        <div class="relative">
          <span class="material-symbols-outlined absolute right-3 top-3.5 text-outline text-xl">lock</span>
          <input type="password" id="passInput" placeholder="كلمة المرور"
            class="w-full bg-background border-none rounded-2xl pr-11 pl-4 py-4 text-sm focus:ring-2 focus:ring-secondary transition-all">
        </div>
        <button onclick="login()" id="loginBtn"
          class="w-full bg-secondary text-white py-4 rounded-2xl font-bold text-lg shadow-lg shadow-secondary/20 hover:bg-secondary/90 hover:scale-[1.01] active:scale-95 transition-all flex items-center justify-center gap-2">
          <span>دخول آمن</span>
          <span class="material-symbols-outlined">login</span>
        </button>
      </div>
      <p id="loginError" class="text-red-500 text-xs mt-4 hidden"></p>
    </div>
  </div>

  <!-- Dashboard Section -->
  <div id="dashboard" class="hidden w-full max-w-2xl mx-auto pb-20 animate-[fadeIn_0.5s_ease-out]">
    <header
      class="flex items-center justify-between mb-8 bg-white/60 backdrop-blur-md p-4 rounded-3xl custom-shadow sticky top-0 z-50">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-secondary/10 rounded-full flex items-center justify-center">
          <span class="material-symbols-outlined text-secondary">person</span>
        </div>
        <h3 id="welcomeText" class="font-bold text-primary text-sm md:text-base"></h3>
      </div>
      <button onclick="navigateTo('home')"
        class="w-10 h-10 bg-red-50 text-red-500 rounded-xl flex items-center justify-center hover:bg-red-500 hover:text-white transition-all">
        <span class="material-symbols-outlined">logout</span>
      </button>
    </header>

    <div class="flex items-center justify-between mb-4 px-2">
      <h3 class="font-bold text-primary flex items-center gap-2">
        <span class="material-symbols-outlined text-secondary">inventory_2</span>
        شحناتك الحالية
      </h3>
    </div>

    <div id="ordersList" class="space-y-6">
      <div class="flex flex-col items-center justify-center py-20 text-outline">
        <span class="material-symbols-outlined text-5xl animate-spin mb-4">sync</span>
        <p>جاري تحميل الشحنات...</p>
      </div>
    </div>
  </div>

  <script>
    var currentCourier = "";

    function navigateTo(page) {
      if (typeof google !== 'undefined' && google.script) {
        google.script.run.withSuccessHandler(function (url) {
          if (page === 'home' || page === 'Index' || !page) {
            window.top.location.href = url.split("?")[0];
          } else {
            window.top.location.href = url + "?page=" + page;
          }
        }).getAppUrl();
      } else {
        window.location.href = (page === 'home' || page === 'Index' || !page) ? "Index.html" : "?page=" + page;
      }
    }

    function login() {
      var email = document.getElementById('emailInput').value.trim();
      var pass = document.getElementById('passInput').value.trim();
      var btn = document.getElementById('loginBtn');
      var errorEl = document.getElementById('loginError');

      if (!email || !pass) {
        errorEl.innerText = "الرجاء إدخال الإيميل والرقم السري.";
        errorEl.classList.remove('hidden');
        return;
      }

      btn.innerText = "جاري التحقق...";
      btn.disabled = true;
      errorEl.classList.add('hidden');

      if (typeof google !== 'undefined' && google.script) {
        google.script.run.withSuccessHandler(function (response) {
          btn.innerHTML = '<span>دخول آمن</span> <span class="material-symbols-outlined">login</span>';
          btn.disabled = false;
          if (response.error) {
            errorEl.classList.remove('hidden');
            errorEl.innerText = response.error;
          } else {
            currentCourier = response.courierName;
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('welcomeText').innerText = currentCourier;
            renderOrders(response.orders);
          }
        }).withFailureHandler(function (err) {
          btn.innerHTML = '<span>دخول آمن</span> <span class="material-symbols-outlined">login</span>';
          btn.disabled = false;
          errorEl.classList.remove('hidden');
          errorEl.innerText = "حدث خطأ في الخادم: " + err.message;
        }).getCourierOrders(email, pass);
      } else {
        setTimeout(function () {
          btn.disabled = false;
          document.getElementById('loginSection').classList.add('hidden');
          document.getElementById('dashboard').classList.remove('hidden');
          document.getElementById('welcomeText').innerText = "مندوب تجريبي";
          renderOrders([{ 
            row: 2, id: "TRK-TEST", 
            status: "تم الإنشاء",
            receiver: "أحمد علي", receiverPhone: "+20123456789", receiverAddress: "الجيزة - الهرم",
            sender: "متجر تجريبي", senderPhone: "+20109998877", senderAddress: "القاهرة - المعادي",
            amount: 250, inspection: 'نعم', payMethod: 'COD' 
          }]);
        }, 800);
      }
    }

    function renderOrders(orders) {
      var list = document.getElementById('ordersList');
      var html = "";

      if (orders.length === 0) {
        list.innerHTML = `
          <div class="bg-white p-12 rounded-[2.5rem] custom-shadow text-center border border-dashed border-slate-200">
            <span class="material-symbols-outlined text-6xl text-green-500 mb-4">check_circle</span>
            <p class="text-primary font-bold text-lg mb-2">لا توجد شحنات!</p>
            <p class="text-outline text-sm">أنهيت جميع المهام المسندة إليك، عمل رائع.</p>
          </div>`;
        return;
      }

      orders.forEach(function (o) {
        var recPhoneStr = String(o.receiverPhone);
        var recWaNumber = recPhoneStr.replace(/\D/g, '');
        if (recWaNumber.startsWith('0')) recWaNumber = '2' + recWaNumber;

        var senPhoneStr = String(o.senderPhone);
        var senWaNumber = senPhoneStr.replace(/\D/g, '');
        if (senWaNumber.startsWith('0')) senWaNumber = '2' + senWaNumber;

        html += `
          <div class="bg-white rounded-[2.5rem] custom-shadow border border-slate-100 overflow-hidden" id="card-${o.row}">
            <!-- Card Header -->
            <div class="bg-primary p-6 text-white flex justify-between items-center">
              <div class="text-right">
                <p class="text-[10px] text-white/60 font-bold uppercase tracking-wider">رقم الشحنة</p>
                <h4 class="font-bold text-xl">${o.id}</h4>
              </div>
              <div class="bg-white/10 p-3 rounded-2xl backdrop-blur-md">
                <span class="material-symbols-outlined">package_2</span>
              </div>
            </div>

            <div class="p-6 space-y-6">
              <!-- Mission Badge -->
              <div class="flex items-center gap-2 mb-2">
                ${o.status === 'تم الإنشاء' ? 
                  `<span class="px-3 py-1 bg-green-100 text-green-700 text-[10px] font-black rounded-full border border-green-200 flex items-center gap-1"><span class="material-symbols-outlined text-xs">local_shipping</span>مهمة: استلام من التاجر</span>` :
                  (o.status === 'في المخزن' ? 
                  `<span class="px-3 py-1 bg-purple-100 text-purple-700 text-[10px] font-black rounded-full border border-purple-200 flex items-center gap-1"><span class="material-symbols-outlined text-xs">inventory_2</span>مهمة: خروج للتوصيل</span>` : 
                  `<span class="px-3 py-1 bg-blue-100 text-blue-700 text-[10px] font-black rounded-full border border-blue-200 flex items-center gap-1"><span class="material-symbols-outlined text-xs">person_pin_circle</span>مهمة: تسليم للعميل</span>`
                  )
                }
              </div>

              <!-- Address Details (Dynamic Priority) -->
              <div class="space-y-4">
                <!-- Target Address -->
                <div class="${o.status === 'تم الإنشاء' ? 'bg-green-50 border-green-100' : 'bg-blue-50 border-blue-100'} p-5 rounded-3xl border">
                  <div class="flex items-start gap-4 mb-3 text-right">
                    <div class="w-10 h-10 ${o.status === 'تم الإنشاء' ? 'bg-green-600/10 text-green-600' : 'bg-blue-600/10 text-blue-600'} rounded-2xl flex items-center justify-center shrink-0">
                      <span class="material-symbols-outlined">${o.status === 'تم الإنشاء' ? 'store' : 'person_pin_circle'}</span>
                    </div>
                    <div class="flex-1">
                      <p class="text-[10px] ${o.status === 'تم الإنشاء' ? 'text-green-600' : 'text-blue-600'} font-bold uppercase tracking-wider">${o.status === 'تم الإنشاء' ? 'نقطة الاستلام (التاجر)' : 'نقطة التسليم (العميل)'}</p>
                      <h5 class="font-bold text-primary text-xl mb-1">${o.status === 'تم الإنشاء' ? o.sender : o.receiver}</h5>
                      <div class="flex items-start gap-1 text-outline">
                        <span class="material-symbols-outlined text-base mt-0.5">location_on</span>
                        <p class="text-xs font-black">${o.status === 'تم الإنشاء' ? o.senderAddress : o.receiverAddress}</p>
                      </div>
                    </div>
                  </div>
                  <div class="grid grid-cols-2 gap-3">
                    <a href="tel:${o.status === 'تم الإنشاء' ? o.senderPhone : o.receiverPhone}" class="flex items-center justify-center gap-2 ${o.status === 'تم الإنشاء' ? 'bg-green-600' : 'bg-blue-600'} text-white py-3 rounded-2xl font-bold text-sm shadow-md hover:opacity-90 transition-all active:scale-95">
                      <span class="material-symbols-outlined text-lg">call</span> اتصال
                    </a>
                    <a href="https://wa.me/${o.status === 'تم الإنشاء' ? senWaNumber : recWaNumber}" target="_blank" class="flex items-center justify-center gap-2 bg-[#25D366] text-white py-3 rounded-2xl font-bold text-sm shadow-md hover:opacity-90 transition-all active:scale-95">
                      <span class="material-symbols-outlined text-lg">chat</span> واتساب
                    </a>
                  </div>
                </div>

                <!-- Secondary Info (Details) -->
                <div class="bg-slate-50/50 p-4 rounded-2xl border border-slate-100 text-right">
                    <p class="text-[10px] text-outline font-bold uppercase mb-2">معلومات الشحنة</p>
                    <div class="flex flex-wrap gap-2 mb-3">
                        <div class="flex items-center gap-1 bg-white px-2 py-1 rounded-lg text-[10px] font-bold text-slate-600 border border-slate-100">
                          <span class="material-symbols-outlined text-sm">visibility</span>
                          <span>المعاينة: ${o.inspection === 'نعم' ? 'مسموح' : 'ممنوع'}</span>
                        </div>
                        <div class="flex items-center gap-1 bg-white px-2 py-1 rounded-lg text-[10px] font-bold text-slate-600 border border-slate-100">
                          <span class="material-symbols-outlined text-sm">payments</span>
                          <span>الدفع: ${o.payMethod === 'WALLET_INSTAPAY' ? 'محفظة / إنستا' : (o.payMethod === 'ALL' ? 'الكل' : 'نقداً')}</span>
                        </div>
                    </div>
                    <div class="flex items-center justify-between p-4 bg-primary rounded-2xl text-white">
                        <div class="flex flex-col gap-3">
                          <div class="flex justify-between items-start">
                              <h4 class="font-bold text-xl">${o.id}</h4>
                              ${o.priority && o.priority != 999999 ? `<span class="bg-white/20 text-white text-[10px] font-bold px-2 py-1 rounded-lg">رقم المسار: ${o.priority}</span>` : ''}
                          </div>
                          <div>
                             <p class="text-[10px] text-white/50 font-bold">التحصيل المطلـوب</p>
                             <p class="text-lg font-black text-secondary">${o.amount} <small class="text-[10px]">ج.م</small></p>
                          </div>
                        </div>
                        <div class="w-10 h-10 bg-white/10 rounded-xl flex items-center justify-center">
                            <span class="material-symbols-outlined text-secondary">payments</span>
                        </div>
                    </div>
                </div>
              </div>

              <!-- Action Area -->
              <div class="pt-4 border-t border-slate-100 text-right">
                ${o.status === 'تم الإنشاء' ? `
                  <button class="w-full bg-green-600 text-white py-5 rounded-[1.5rem] font-black text-lg shadow-lg shadow-green-100 hover:bg-green-700 active:scale-95 transition-all flex items-center justify-center gap-3" 
                    id="btnPick-${o.row}" onclick="processSimpleAction(${o.row}, 'picked_up')">
                    تأكيد استلام الشحنة من التاجر
                    <span class="material-symbols-outlined text-2xl">check_box</span>
                  </button>
                ` : o.status === 'في المخزن' ? `
                  <button class="w-full bg-purple-600 text-white py-5 rounded-[1.5rem] font-black text-lg shadow-lg shadow-purple-100 hover:bg-purple-700 active:scale-95 transition-all flex items-center justify-center gap-3" 
                    id="btnOut-${o.row}" onclick="processSimpleAction(${o.row}, 'out_for_delivery')">
                    بدء رحلة التوصيل الآن
                    <span class="material-symbols-outlined text-2xl">local_shipping</span>
                  </button>
                ` : `
                  <div class="space-y-4">
                    <div>
                      <label class="block text-sm font-bold text-primary mb-3 flex items-center gap-2">
                        <span class="material-symbols-outlined text-secondary">add_a_photo</span>
                        صورة إثبات التسليم أو المرتجع
                      </label>
                      <label class="flex flex-col items-center justify-center w-full h-32 border-2 border-dashed border-slate-300 rounded-[2rem] cursor-pointer bg-slate-50 hover:bg-slate-100 hover:border-secondary transition-all overflow-hidden group">
                        <div id="preview-container-${o.row}" class="flex flex-col items-center justify-center">
                          <span class="material-symbols-outlined text-3xl text-outline mb-2 group-hover:scale-110 transition-transform">photo_camera</span>
                          <p class="text-xs text-outline font-bold">التقاط صورة الدليل</p>
                        </div>
                        <input type="file" id="file-${o.row}" accept="image/*" capture="camera" class="hidden" onchange="handleFilePreview(this, ${o.row})">
                      </label>
                    </div>
                    <div class="space-y-2">
                      <label class="block text-sm font-bold text-primary mb-1">📝 سبب المرتجع (اختياري)</label>
                      <input type="text" id="reason-${o.row}" placeholder="مثال: العميل لم يرد..." class="w-full bg-slate-50 border-none rounded-2xl px-4 py-3 text-sm focus:ring-2 focus:ring-secondary transition-all">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                      <button class="bg-[#27ae60] text-white py-5 rounded-[1.5rem] font-black text-sm shadow-lg shadow-green-100 hover:opacity-90 active:scale-95 transition-all flex flex-col items-center justify-center gap-1" 
                        id="btnDel-${o.row}" onclick="processAction(${o.row}, 'delivered')">
                        <span>تم التسليم</span>
                        <span class="material-symbols-outlined">verified</span>
                      </button>
                      <button class="bg-[#e74c3c] text-white py-5 rounded-[1.5rem] font-black text-sm shadow-lg shadow-red-100 hover:opacity-90 active:scale-95 transition-all flex flex-col items-center justify-center gap-1" 
                        id="btnRet-${o.row}" onclick="processAction(${o.row}, 'returned')">
                        <span>مرتجع</span>
                        <span class="material-symbols-outlined">cancel</span>
                      </button>
                    </div>
                  </div>
                `}
              </div>
            </div>
          </div>`;
      });

      list.innerHTML = html;
    }

    function handleFilePreview(input, row) {
      if (input.files && input.files[0]) {
        var container = document.getElementById('preview-container-' + row);
        container.innerHTML = `
          <div class="flex items-center gap-2 text-green-600 font-bold scale-110 animate-[bounce_0.5s_ease-out]">
            <span class="material-symbols-outlined text-3xl">check_circle</span>
            <span>جاهز للرفع</span>
          </div>
        `;
      }
    }

    function compressImage(file, callback) {
      var reader = new FileReader();
      reader.onload = function (event) {
        var img = new Image();
        img.onload = function () {
          var canvas = document.createElement('canvas');
          var MAX_WIDTH = 800;
          var scaleSize = MAX_WIDTH / img.width;
          if (img.width > MAX_WIDTH) { canvas.width = MAX_WIDTH; canvas.height = img.height * scaleSize; }
          else { canvas.width = img.width; canvas.height = img.height; }
          var ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          var dataUrl = canvas.toDataURL('image/jpeg', 0.6);
          callback(dataUrl);
        }
        img.src = event.target.result;
      }
      reader.readAsDataURL(file);
    }

    function processAction(row, actionType) {
      var fileInput = document.getElementById('file-' + row);
      var reasonInput = document.getElementById('reason-' + row).value.trim();
      var btnDel = document.getElementById('btnDel-' + row);
      var btnRet = document.getElementById('btnRet-' + row);

      if (fileInput.files.length === 0) {
        alert("⚠️ تنبيه: لا يمكنك إتمام العملية بدون إرفاق صورة الإثبات!");
        return;
      }

      if (actionType === 'returned' && reasonInput === "") {
        alert("⚠️ تنبيه: الرجاء كتابة سبب الإرجاع في المربع المخصص!");
        return;
      }

      btnDel.disabled = true; btnRet.disabled = true;
      btnDel.classList.add('opacity-50'); btnRet.classList.add('opacity-50');

      var activeBtn = (actionType === 'delivered') ? btnDel : btnRet;
      activeBtn.innerHTML = '<span class="material-symbols-outlined animate-spin text-2xl">location_searching</span>';

      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          function (position) {
            var locationData = { lat: position.coords.latitude, lng: position.coords.longitude };
            activeBtn.innerHTML = '<span class="material-symbols-outlined animate-bounce text-2xl">cloud_upload</span>';
            prepareDataAndUpload(row, actionType, fileInput.files[0], reasonInput, locationData);
          },
          function (error) {
            resetButtons(row);
            var errorMsg = "حدث خطأ في تحديد الموقع.";
            if (error.code == 1) errorMsg = "لقد رفضت صلاحية الوصول للموقع!";
            else if (error.code == 2) errorMsg = "الـ GPS غير مفعل في هاتفك.";
            else if (error.code == 3) errorMsg = "فشل التقاط إشارة الـ GPS.";
            alert("❌ لا يمكن إتمام الطلب: " + errorMsg);
          },
          { enableHighAccuracy: true, timeout: 30000, maximumAge: 0 }
        );
      } else {
        alert("متصفحك لا يدعم تحديد الموقع (GPS).");
        resetButtons(row);
      }
    }

    function prepareDataAndUpload(row, actionType, file, reason, locationData) {
      compressImage(file, function (compressedBase64) {
        var filename = "POD_" + actionType + "_" + row + "_" + new Date().getTime() + ".jpg";
        sendToBackend(row, actionType, compressedBase64, filename, reason, locationData);
      });
    }

    function sendToBackend(row, actionType, imageData, filename, reason, locationData) {
      if (typeof google !== 'undefined' && google.script) {
        google.script.run.withSuccessHandler(function (res) {
          if (res.success) {
            var card = document.getElementById('card-' + row);
            card.classList.add('scale-0', 'opacity-0', 'duration-500');
            setTimeout(() => { card.remove(); if(document.querySelectorAll('#ordersList > div[id^="card-"]').length === 0) login(); }, 500);
          } else {
            alert("خطأ: " + res.error);
            resetButtons(row);
          }
        }).processCourierUpdate(row, actionType, imageData, filename, reason, locationData);
      }
    }

    function processSimpleAction(row, actionType) {
      var btn = document.getElementById(actionType === 'picked_up' ? 'btnPick-' + row : 'btnOut-' + row);
      btn.disabled = true;
      btn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> جاري الحفظ...';
      
      if (typeof google !== 'undefined' && google.script) {
        google.script.run.withSuccessHandler(function(res) {
          if(res.success) {
            var card = document.getElementById('card-' + row);
            card.style.transform = 'scale(0.9)';
            card.style.opacity = '0.5';
            setTimeout(() => { login(); }, 500); // Reload to update state
          } else {
            alert("خطأ: " + res.error);
            btn.disabled = false;
            btn.innerText = "فشل المحاولة، أعد المحاولة";
          }
        }).processCourierUpdate(row, actionType, null, null, "", null);
      }
    }

    function resetButtons(row) {
      var btnDel = document.getElementById('btnDel-' + row);
      var btnRet = document.getElementById('btnRet-' + row);
      if(btnDel) {
        btnDel.disabled = false;
        btnDel.classList.remove('opacity-50');
        btnDel.innerHTML = '<span>تم التسليم</span> <span class="material-symbols-outlined">verified</span>';
      }
      if(btnRet) {
        btnRet.disabled = false;
        btnRet.classList.remove('opacity-50');
        btnRet.innerHTML = '<span>مرتجع</span> <span class="material-symbols-outlined">cancel</span>';
      }
    }
  </script>
</body>
