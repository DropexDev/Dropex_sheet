        .page-enter { animation: fadeInUp 0.4s ease-out forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        /* Disabled button state */
        .btn-disabled { opacity: 0.5; cursor: not-allowed; pointer-events: none; }

</head>

    <!-- JS Logic -->
    <script>
        var currentCourier = "";

        // Safe URL builder for Whatsapp
        function getWaLink(phone) {
            let num = String(phone).trim();
            return num.startsWith('0') ? '2' + num : num;
        }

        function login() {
            var email = document.getElementById('emailInput').value.trim();
            var pass = document.getElementById('passInput').value.trim();
            var btn = document.getElementById('loginBtn');
            var err = document.getElementById('loginError');
            
            if(!email || !pass) {
                err.innerText = "الرجاء إدخال الإيميل والرقم السري.";
                err.style.display = 'block';
                return;
            }

            btn.innerHTML = '<span class="material-symbols-outlined animate-spin text-xl">sync</span> جاري التحقق...';
            btn.disabled = true;
            err.style.display = 'none';

            if(typeof google !== 'undefined' && google.script) {
                google.script.run.withSuccessHandler(function(response) {
                    btn.innerHTML = 'دخول المنصة <span class="material-symbols-outlined text-lg">arrow_left_alt</span>';
                    btn.disabled = false;
                    
                    if (response.error) {
                        err.classList.remove('hidden'); err.style.display = 'block'; err.innerText = response.error;
                    } else {
                        currentCourier = response.courierName;
                        document.getElementById('loginSection').style.display = 'none';
                        document.getElementById('dashboard').style.display = 'flex';
                        document.getElementById('welcomeText').innerText = "كابتن " + currentCourier;
                        renderOrders(response.orders);
                    }
                }).withFailureHandler(function(e) {
                    btn.innerHTML = 'دخول المنصة <span class="material-symbols-outlined text-lg">arrow_left_alt</span>';
                    btn.disabled = false;
                    err.classList.remove('hidden'); err.style.display = 'block'; err.innerText = "خطأ من الخادم مقطوع: " + e.message;
                }).getCourierOrders(email, pass);
            } else {
                // Local testing fallback
                setTimeout(() => {
                    document.getElementById('loginSection').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'flex';
                    currentCourier = "سالم القحطاني";
                    document.getElementById('welcomeText').innerText = "كابتن " + currentCourier;
                    renderOrders([
                        {row: 2, id: 'TRK-9002', receiver: 'محمد العبدالله', address: 'الرياض، حي الملقا، شارع الأبراج', receiverPhone: '0501112222', sender: 'متجر الأزياء', senderPhone: '0598887777', amount: 350},
                        {row: 3, id: 'TRK-1055', receiver: 'عبدالرحمن', address: 'جدة، حي الشاطئ، شارع الكورنيش', receiverPhone: '0554443333', sender: 'إلكترونيات سمارت', senderPhone: '0541110000', amount: 1200}
                    ]);
                }, 800);
            }
        }

                return;

                let recWa = getWaLink(o.receiverPhone);
                let senWa = getWaLink(o.senderPhone);

                html += `

                    <!-- Client Connections -->

                            <div class="flex justify-between items-start mb-2">
                                <div class="flex items-start gap-2">

                                    <div>
                                        <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest pl-1">المستلم (الزبون)</p>
                                        <p class="text-sm font-bold text-primary leading-tight">${o.receiver}</p>
                                    </div>

                            <p class="text-[11px] font-medium text-slate-500 pr-7 leading-relaxed mb-3">${o.address}</p>
                            
                            <div class="flex gap-2 pr-7">
                                <a href="tel:${o.receiverPhone}" class="flex-1 h-9 rounded-xl border border-slate-200 bg-white text-primary flex items-center justify-center gap-1 shadow-sm hover:bg-slate-50 active:bg-slate-100 transition text-[10px] items-center font-bold"><span class="material-symbols-outlined text-[1rem]">call</span> اتصال</a>
                                <a href="https://wa.me/${recWa}" target="_blank" class="flex-1 h-9 rounded-xl bg-[#25D366] text-white flex items-center justify-center gap-1 shadow-sm shadow-[#25D366]/20 hover:opacity-90 transition text-[10px] items-center font-bold"><span class="material-symbols-outlined text-[1rem]">chat</span> واتساب</a>

                        <!-- Sender -->
                        <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 relative overflow-hidden">
                            <div class="absolute top-0 right-0 w-1 h-full bg-slate-300"></div>
                            <div class="flex justify-between items-center">
                                <div class="flex items-start gap-2">
                                    <span class="material-symbols-outlined text-slate-400 text-lg">store</span>
                                    <div>

                                    <a href="https://wa.me/${senWa}" target="_blank" class="w-9 h-9 rounded-xl bg-[#25D366] text-white flex items-center justify-center shadow-sm shadow-[#25D366]/20"><span class="material-symbols-outlined text-[1rem]">chat</span></a>
                                </div>

                    </div>

                    <!-- Financials -->
                    <div class="bg-red-50 border border-red-100 p-4 rounded-2xl mb-5 text-center shadow-sm relative overflow-hidden">

        // Image compression helper (keeps identical logical flow but inside app scope)
        function compressImage(file, callback) {
            var reader = new FileReader();
            reader.onload = function(event) {
                var img = new Image();
                img.onload = function() {
                    var canvas = document.createElement('canvas');
                    var MAX_WIDTH = 800; 
                    var scaleSize = MAX_WIDTH / img.width;
                    if (img.width > MAX_WIDTH) { canvas.width = MAX_WIDTH; canvas.height = img.height * scaleSize; } 
                    else { canvas.width = img.width; canvas.height = img.height; }
                    var ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    var dataUrl = canvas.toDataURL('image/jpeg', 0.6); 
                    callback(dataUrl);
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        }

        function processAction(row, actionType) {
            var fileInput = document.getElementById('file-' + row);
            var reasonInput = document.getElementById('reason-' + row).value.trim();
            var btnDel = document.getElementById('btnDel-' + row);
            var btnRet = document.getElementById('btnRet-' + row);

            // 1. Mandatory image check
            if (fileInput.files.length === 0) { 
                alert("⚠️ لا يمكنك تجاوز هذه الخطوة: يجب إرفاق صورة إثبات الاستلام أو صورة لمكان التسليم كمرتجع!"); 
                return; 
            }
            // 2. Mandatory reason if returned
            if (actionType === 'returned' && reasonInput === "") { 
                alert("⚠️ للتسجيل كمرتجع: يجب أن تكتب السبب بوضوح في المربع المخصص!"); 
                document.getElementById('reason-' + row).focus();
                return; 
            }

            // Lock UI
            btnDel.classList.add('btn-disabled'); btnRet.classList.add('btn-disabled');
            var activeBtn = (actionType === 'delivered') ? btnDel : btnRet;
            activeBtn.innerHTML = '<span class="material-symbols-outlined animate-spin text-sm">sync</span> سحب الموقع...';

            var uploadedFile = fileInput.files[0];

            // GeoLocation Fetch
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    function(position) {
                        var locationData = { lat: position.coords.latitude, lng: position.coords.longitude };
                        activeBtn.innerHTML = '<span class="material-symbols-outlined animate-spin text-sm">cloud_upload</span> رفع البيانات...';
                        prepareDataAndUpload(row, actionType, uploadedFile, reasonInput, locationData);
                    }, 
                    function(error) { 
                        var errorMsg = "حدث خطأ في تحديد الموقع.";
                        if(error.code == 1) errorMsg = "لا توجد صلاحية للـ GPS، يرجى تفعيله من إعدادات المتصفح!";
                        else if(error.code == 2) errorMsg = "لا يمكن التقاط إشارة الـ GPS. تأكد من تفعيله.";
                        else if(error.code == 3) errorMsg = "انتهى وقت سحب الموقع (إشارة ضعيفة).";
                        alert("❌ فشل: " + errorMsg);
                        resetButtons(row);
                    },
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 } 
                );
            } else { 
                alert("جهازك لا يدعم خاصية تحديد الموقع.");
                resetButtons(row);
            }
        }

        function prepareDataAndUpload(row, actionType, file, reason, locationData) {
            compressImage(file, function(compressedBase64) {
                var filename = "POD_" + actionType + "_" + row + "_" + new Date().getTime() + ".jpg";
                
                if(typeof google !== 'undefined' && google.script) {
                    google.script.run.withSuccessHandler(function(res) {
                        if(res.success) {
                            alert("✅ تمت العملية بنجاح! تم حفظ الموقع والصورة والتحديث.");
                            document.getElementById('card-' + row).style.display = 'none';
                        } else {
                            alert("خطأ: " + res.error); resetButtons(row);
                        }
                    }).processCourierUpdate(row, actionType, compressedBase64, filename, reason, locationData);
                } else {
                    // Local dev test
                    setTimeout(()=>{
                        alert("✅ تمت العملية بنجاح! (معاينة محلية)");
                        document.getElementById('card-' + row).style.display = 'none';
                    }, 1000);
                }
            });
        }

        function resetButtons(row) {
            var btnDel = document.getElementById('btnDel-' + row);
            var btnRet = document.getElementById('btnRet-' + row);
            btnDel.classList.remove('btn-disabled'); btnRet.classList.remove('btn-disabled');
            btnDel.innerHTML = '<span class="material-symbols-outlined text-[1.1rem]">task_alt</span> إتمام التوصيل';
            btnRet.innerHTML = '<span class="material-symbols-outlined text-[1.1rem]">cancel</span> تسجيل كمرتجع';
        }
    </script>
</body>
</html>
